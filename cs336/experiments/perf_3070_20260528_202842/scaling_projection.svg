<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<rect width="1200" height="720" fill="#FFFFFF"/>
<style>text{font-family:Inter,Arial,sans-serif}.title{font-size:30px;font-weight:750;fill:#172026}.subtitle{font-size:15px;fill:#667085}.paneltitle{font-size:18px;font-weight:700;fill:#172026}.axis{font-size:12px;fill:#667085}.label{font-size:13px;font-weight:650;fill:#344054}.value{font-size:15px;font-weight:750;fill:#172026}.note{font-size:13px;fill:#667085}.callout{font-size:15px;font-weight:700;fill:#172026}.small{font-size:12px;fill:#667085}</style>
<text x="64" y="44" class="title">Runtime Projection From Local 3070 Measurements</text>
<text x="64" y="72" class="subtitle">Target budget: 327.68M training tokens. Projection uses measured end-to-end throughput, not a loss scaling law.</text>
<rect x="64" y="96" width="1072" height="64" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
<text x="86" y="123" class="callout">Measured RTX 3070 Laptop:</text>
<text x="286" y="123" class="callout">21,891 tokens/sec</text>
<text x="86" y="147" class="note">40.96M tokens in 31.2 min; linear projection to 327.68M tokens is 249.5 min (4.16 h).</text>
<text x="690" y="123" class="callout">B200 reference gap:</text>
<text x="862" y="123" class="callout">8.3x - 12.5x</text>
<text x="690" y="147" class="note">Throughput needed for 30-20 min: 182,044 - 273,067 tokens/sec.</text>
